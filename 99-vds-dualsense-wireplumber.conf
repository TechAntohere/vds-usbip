monitor.alsa.rules = [
  {
    matches = [
      {
        "device.name": "~alsa_card.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "device.description": "DualSense Wireless Controller"
        "device.nick": "DualSense"
      }
    }
  }
  {
    matches = [
      {
        "node.name": "~alsa_output.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "node.description": "Wireless Controller"
        "node.nick": "Wireless Controller"
        "audio.channels": 4
        "audio.position": [ "FL", "FR", "RL", "RR" ]
        "channelmix.normalize": false
        "priority.session": 100
        "priority.driver": 100
      }
    }
  }
  {
    matches = [
      {
        "node.name": "~alsa_input.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "node.description": "Wireless Controller Mic"
        "node.nick": "Wireless Controller Mic"
        # Use passive links so idle mic monitors do not keep this source busy;
        # otherwise the virtual USB mic can stay active after capture stops.
        "node.passive": true
        # Give this source no graph-driver priority because vDS mic pacing is
        # bridged through Bluetooth and should not clock unrelated playback.
        "priority.driver": 0
        # Keep this source visible but avoid selecting it as the default input.
        "priority.session": 1
        # Match PipeWire's default 128-frame graph quantum. vDS buffers the
        # 10 ms Bluetooth mic packets in the virtual HCD, so forcing a 480-frame
        # ALSA period makes PipeWire repeatedly resync this capture node.
        "api.alsa.period-size": 128
        "api.alsa.period-num": 8
        "node.latency": "128/48000"
        # Tell WirePlumber to suspend this source after 1 second of inactivity.
        # This closes ALSA so idle level meters do not keep the controller mic
        # stream active when no application is actually recording from it.
        "session.suspend-timeout-seconds": 1
      }
    }
  }
]
