monitor.alsa.rules = [
  {
    matches = [
      {
        "device.name": "~alsa_card.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "device.description": "DualSense Wireless Controller"
        "device.nick": "DualSense"
      }
    }
  }
  {
    matches = [
      {
        "node.name": "~alsa_output.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "node.description": "Wireless Controller"
        "node.nick": "Wireless Controller"
        "audio.channels": 4
        # PipeWire treats audio.position as SPA audio channel enums, not as
        # arbitrary display labels. A real DualSense/DualSense Edge in Pro Audio
        # mode is exposed as AUX0/AUX1/AUX2/AUX3, but forcing those AUX channel
        # names here can break controller speaker and vibration motor behavior.
        # Use the standard 4-channel positional layout so game audio channels
        # map predictably to vDS channel slots 0, 1, 2, and 3.
        "audio.position": [ "FL", "FR", "RL", "RR" ]
        "channelmix.normalize": false
        "priority.session": 100
        "priority.driver": 100
      }
    }
  }
  {
    matches = [
      {
        "node.name": "~alsa_input.usb-Sony_Interactive_Entertainment_DualSense.*Wireless_Controller.*"
      }
    ]
    actions = {
      "update-props": {
        "node.description": "Wireless Controller Mic"
        "node.nick": "Wireless Controller Mic"
        # vDS does not support microphone input yet. Disable this source because
        # capture traffic can disrupt the controller speaker, haptics output,
        # and main audio playback.
        "node.disabled": true
        "priority.session": 1
        "priority.driver": 1
        "session.suspend-timeout-seconds": 0
      }
    }
  }
]
